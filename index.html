<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowLog - 植物の成長をデータで楽しむ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script type="module" src="./assets/js/script.js" defer></script>
</head>
<body>
    <div class="page-container">
        <!-- Background Decorations -->
        <div class="bg-decoration"></div>
        <div class="bg-circle"></div>
        
        <!-- Navigation Bar -->
        <nav class="navigation-bar">
            <div class="container-logo">
                <h1 class="logo">GrowLog</h1>
            </div>
            
            <div class="nav-links">
                <a href="#features" class="nav-link">GrowLogでできることmain</a>
                <a href="#details" class="nav-link">機能詳細</a>
                <a href="#pricing" class="nav-link">料金プラン</a>
                <a href="#cases" class="nav-link">導入事例</a>
            </div>
            
            <button class="btn-contact">お問い合わせ</button>
        </nav>
        
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-content">
                <div class="hero-heading" data-hero-heading data-effect>
                    <div class="heading-line">
                        <span class="heading-text" data-split>植物の成長を、</span>
                    </div>
                    <div class="heading-line">
                        <span class="heading-text" data-split>データで楽しむ。</span>
                    </div>
                </div>
                
                <div class="hero-detail">
                    <p>水やり・日照・成長記録を自動管理。<br>あなたの植物を "枯らさない" 新習慣。</p>
                </div>
                
                <button class="btn-contact-large">お問い合わせ</button>
            </div>
            
            <div class="hero-image" data-effect>
                <img src="./assets/img/hero.png" alt="スマートフォンと植物のイメージ">
            </div>
        </section>
        
        <!-- Core Services Section -->
        <section class="services-section">
            <div class="section-heading">
                <h2>こんなお悩みありませんか？</h2>
            </div>
            
            <div class="services-placeholder">
            </div>
        </section>
        
        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p>© 2026 <span class="footer-brand">GrowLog</span></p>
            </div>
        </footer>
    </div>
